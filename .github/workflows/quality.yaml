name: Quality

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Update dependencies
        run: sh ./.github/scripts/ci/update-dependencies.sh

      - name: Render Helm Charts
        run: |
          mkdir rendered
          helm template failover charts/failover > rendered/failover.yaml
          helm template scaleout charts/scaleout > rendered/scaleout.yaml

      - name: Scan with kube-linter
        uses: stackrox/kube-linter-action@v1.0.7
        with:
          directory: rendered/
          format: plain

  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: 'config'
          scan-ref: 'charts'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Checkov action
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: charts/
          framework: helm
          soft_fail: false
          output_format: cli
          skip_check: CKV_K8S_21,CKV_K8S_35,CKV_K8S_22,CKV_K8S_15,CKV_K8S_38,CKV_K8S_43,CKV_K8S_40,CKV2_K8S_6
