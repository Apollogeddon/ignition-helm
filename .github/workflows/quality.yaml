name: Code Quality

on:
  workflow_run:
    workflows: ["Linting and Testing"]
    types:
      - completed

permissions:
  contents: read
  security-events: write

jobs:
  kube-linter:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.4

      - name: Render Helm Charts
        run: |
          mkdir rendered
          
          # Render Failover
          helm dependency build charts/failover
          helm template failover charts/failover > rendered/failover.yaml
          
          # Render Scaleout
          helm dependency build charts/scaleout
          helm template scaleout charts/scaleout > rendered/scaleout.yaml

      - name: Scan with kube-linter
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: rendered/
          format: plain

  trivy:
    needs: kube-linter
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'config'
          scan-ref: 'charts'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  checkov:
    needs: trivy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Checkov action
        uses: bridgecrewio/checkov-action@master
        with:
          directory: charts/
          framework: helm
          soft_fail: false
          output_format: cli
