suite: Ignition Scaleout Backend StatefulSet
templates:
  - templates/backend/backend-statefulset.yaml
tests:
  - it: should match snapshot with default values
    asserts:
      - matchSnapshot: {}

  - it: should have correct default metadata
    asserts:
      - isKind:
          of: StatefulSet
      - matchRegex:
          path: metadata.name
          pattern: -backend$
      - equal:
          path: spec.replicas
          value: 1

  - it: should enable redundancy when configured
    set:
      backend:
        redundancy:
          enabled: true
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should configure affinity
    set:
      affinity:
        enabled: true
    asserts:
      - exists:
          path: spec.template.spec.affinity

  - it: should configure resources
    set:
      backend:
        resources:
          requests:
            memory: 2Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 2Gi

  - it: should set storage class
    set:
      backend:
        persistence:
          storageClassName: "fast"
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: "fast"

  - it: should not have web-tls volume by default
    template: templates/backend/backend-statefulset.yaml
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: ignition-scaleout-web-tls
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ignition-scaleout-web-tls
            mountPath: /run/secrets/web-tls

  - it: should enable web-tls when configured
    template: templates/backend/backend-statefulset.yaml
    set:
      backend:
        ssl:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ignition-scaleout-web-tls
            secret:
              secretName: ignition-scaleout-web-tls
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ignition-scaleout-web-tls
            mountPath: /run/secrets/web-tls
            readOnly: true

  - it: should set updateStrategy to OnDelete when configured
    set:
      backend:
        updateStrategy:
          type: OnDelete
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete
      - notExists:
          path: spec.updateStrategy.rollingUpdate

  - it: should mount external modules pvc
    set:
      backend:
        externalModules:
          enabled: true
          pvcName: "my-backend-modules"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /usr/local/bin/ignition/user-lib/modules
            name: external-modules
      - contains:
          path: spec.template.spec.volumes
          content:
            name: external-modules
            persistentVolumeClaim:
              claimName: "my-backend-modules"
