suite: Ignition Failover Extra Features
templates:
  - ignition-statefulset.yaml
tests:
  - it: should configure local mounts
    set:
      ignition:
        localMounts:
          - hostPath: "/host/projects"
            mountPath: "data/projects"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: local-mount-0
            mountPath: /usr/local/bin/ignition/data/projects
      - contains:
          path: spec.template.spec.volumes
          content:
            name: local-mount-0
            hostPath:
              path: /host/projects
              type: Directory

  - it: should configure restore from URL
    set:
      ignition:
        restore:
          enabled: true
          url: "http://files/my.gwbk"
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: IGNITION_RESTORE_URL
            value: "http://files/my.gwbk"

  - it: should configure restore from Path
    set:
      ignition:
        restore:
          enabled: true
          path: "/restore/backup.gwbk"
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: IGNITION_RESTORE_PATH
            value: "/restore/backup.gwbk"

  - it: should not have web-tls volume by default
    template: ignition-statefulset.yaml
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: ignition-failover-web-tls
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ignition-failover-web-tls
            mountPath: /run/secrets/web-tls

  - it: should enable web-tls when configured
    template: ignition-statefulset.yaml
    set:
      ignition:
        ssl:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ignition-failover-web-tls
            secret:
              secretName: ignition-failover-web-tls
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ignition-failover-web-tls
            mountPath: /run/secrets/web-tls
            readOnly: true